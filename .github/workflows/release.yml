name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Validate release metadata
        run: uv run python scripts/ops/check_release_version.py "${GITHUB_REF_NAME}"

      - name: Validate baseline evidence
        run: uv run python scripts/ops/check_baseline_integrity.py --mode operational

      - name: Test
        run: |
          uv lock --check
          uv run --extra dev pytest

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create GitHub release
        run: gh release create "${GITHUB_REF_NAME}" dist/* --title "ads-and ${GITHUB_REF_NAME#v}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
