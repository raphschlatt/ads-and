[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "author-name-disambiguation"
version = "0.1.0"
description = "Standalone author name disambiguation for source datasets."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
author-name-disambiguation = "author_name_disambiguation.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
author_name_disambiguation = [
  "resources/*.yaml",
  "resources/clustering/*.yaml",
  "resources/infer_runs/*.yaml",
]
