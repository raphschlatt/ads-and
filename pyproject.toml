[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "author-name-disambiguation"
version = "0.1.0"
description = "Standalone author name disambiguation for source datasets."
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
author-name-disambiguation = "author_name_disambiguation.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/author_name_disambiguation"]
