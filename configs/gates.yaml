defaults:
  threshold_bounds:
    min: -0.95
    max: 0.95
  mention_coverage_min: 1.0
  uid_uniqueness_max: 1
  cluster_quality:
    singleton_ratio_max: 0.45
    split_high_sim_rate_probe_max: 0.20
  split_balance_policy:
    infeasible_severity: blocker
    degraded_severity: warning
  eps_policy:
    boundary_hit_severity: warning
    range_limited_delta_f1: 0.005
    range_limited_severity: warning

stages:
  # Legacy root-level stage gates remain for backward compatibility.
  smoke:
    f1_min: 0.80
    min_neg_val: 20
    min_neg_test: 20
    cluster_quality_severity: warning
    split_balance_degraded_severity: warning
    eps_range_limited_severity: warning
  mini:
    f1_min: 0.88
    min_neg_val: 50
    min_neg_test: 50
    cluster_quality_severity: warning
    split_balance_degraded_severity: warning
    eps_range_limited_severity: warning
  mid:
    f1_min: 0.90
    min_neg_val: 200
    min_neg_test: 200
    cluster_quality_severity: blocker
    split_balance_degraded_severity: blocker
    lspo_block_size_p95_min: 2
    lspo_pairs_min: 50000
    eps_range_limited_severity: blocker
  full:
    f1_min: 0.90
    min_neg_val: 500
    min_neg_test: 500
    cluster_quality_severity: blocker
    split_balance_degraded_severity: blocker
    lspo_block_size_p95_min: 2
    lspo_pairs_min: 300000
    eps_range_limited_severity: blocker
  infer_ads:
    f1_min: 0.0
    min_neg_val: 0
    min_neg_test: 0
    cluster_quality_severity: blocker
    eps_range_limited_severity: warning

train:
  stages:
    smoke:
      f1_min: 0.80
      min_neg_val: 20
      min_neg_test: 20
      cluster_quality_severity: warning
      split_balance_degraded_severity: warning
      eps_range_limited_severity: warning
    mini:
      f1_min: 0.88
      min_neg_val: 50
      min_neg_test: 50
      cluster_quality_severity: warning
      split_balance_degraded_severity: warning
      eps_range_limited_severity: warning
    mid:
      f1_min: 0.90
      min_neg_val: 200
      min_neg_test: 200
      cluster_quality_severity: blocker
      split_balance_degraded_severity: blocker
      lspo_block_size_p95_min: 2
      lspo_pairs_min: 50000
      eps_range_limited_severity: blocker
    full:
      f1_min: 0.90
      min_neg_val: 500
      min_neg_test: 500
      cluster_quality_severity: blocker
      split_balance_degraded_severity: blocker
      lspo_block_size_p95_min: 2
      lspo_pairs_min: 300000
      eps_range_limited_severity: blocker

infer:
  stages:
    infer_ads:
      f1_min: 0.0
      min_neg_val: 0
      min_neg_test: 0
      cluster_quality_severity: blocker
      eps_range_limited_severity: warning
